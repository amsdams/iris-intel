name: Build IRIS Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run build
        working-directory: packages/extension

      - name: Package as zip (Kiwi Browser / Chrome)
        run: |
          cd packages/extension/dist
          zip -r ../../../iris-extension.zip .

      - name: Package as xpi (Firefox / Firefox for Android)
        run: |
          cd packages/extension/dist
          zip -r ../../../iris-extension.xpi .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-extension
          path: |
            iris-extension.zip
            iris-extension.xpi
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from commit ${{ github.sha }}

            ## Install on Android

            **Kiwi Browser (recommended):**
            1. Download `iris-extension.zip`
            2. Kiwi Browser → menu → Extensions → Developer mode → Load unpacked → select zip

            **Firefox Nightly for Android:**
            1. In Firefox Nightly go to `about:config`
            2. Set `xpinstall.signatures.required` to `false`
            3. Navigate to this URL in Firefox Nightly:
               `https://github.com/${{ github.repository }}/releases/latest/download/iris-extension.xpi`
            4. Firefox will prompt to install

            ## Install on Desktop

            **Chrome / Chromium / Edge:**
            1. Download and unzip `iris-extension.zip`
            2. `chrome://extensions` → Developer mode → Load unpacked → select folder

            **Firefox Desktop:**
            1. Download `iris-extension.xpi`
            2. `about:addons` → gear icon → Install Add-on From File

          files: |
            iris-extension.zip
            iris-extension.xpi
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}