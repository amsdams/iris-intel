name: Build IRIS Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Chrome extension
        run: npm run build:chrome -w packages/extension

      - name: Build Firefox extension
        run: npm run build:firefox -w packages/extension

      - name: Package Chrome zip
        run: |
          cd packages/extension/dist
          zip -r ../../../iris-chrome.zip .

      - name: Package Firefox xpi
        run: |
          cd packages/extension/dist-firefox
          zip -r ../../../iris-firefox.xpi .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iris-extension
          path: |
            iris-chrome.zip
            iris-firefox.xpi
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest