name: Build IRIS Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Package all apps
        run: npm run package:all

      - name: Prepare artifacts
        run: |
          mkdir -p out
          # Use stable names for the automated latest release
          cp apps/iris/builds/iris-chrome-*.zip out/iris-chrome.zip
          cp apps/iris/builds/iris-firefox-*.xpi out/iris-firefox.xpi
          cp apps/mini-iris/builds/mini-iris-chrome-*.zip out/mini-iris-chrome.zip
          cp apps/mini-iris/builds/mini-iris-firefox-*.xpi out/mini-iris-firefox.xpi
          cp apps/iitc-iris/builds/iitc-iris-chrome-*.zip out/iitc-iris-chrome.zip
          cp apps/iitc-iris/builds/iitc-iris-firefox-*.xpi out/iitc-iris-firefox.xpi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iris-artifacts
          path: out/
          retention-days: 30

      - name: Create/Update Latest Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          make_latest: true
          prerelease: true
          body: |
            Automated build from commit ${{ github.sha }}

            This release contains the latest automated builds for all IRIS variants.

            ### IRIS (Modern)
            Full-featured extension with MapLibre GL.
            - Chrome: `iris-chrome.zip`
            - Firefox: `iris-firefox.xpi`

            ### Mini-IRIS
            Lightweight tactical overlay.
            - Chrome: `mini-iris-chrome.zip`
            - Firefox: `mini-iris-firefox.xpi`

            ### IITC IRIS (Alpha)
            IITC-compatible port with Leaflet.
            - Chrome: `iitc-iris-chrome.zip`
            - Firefox: `iitc-iris-firefox.xpi`

            ---
            **Installation Instructions:**
            Refer to the [README](https://github.com/${{ github.repository }}#installation) for detailed setup guides for Desktop and Android.
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
