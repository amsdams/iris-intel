name: Build IRIS Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package as zip
        run: |
          cd packages/extension/dist
          zip -r ../../../iris-extension.zip .
          echo "Built iris-extension.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-extension
          path: iris-extension.zip
          retention-days: 30
