name: Release IRIS Extension

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build all release artifacts
        run: npm run release:all

      - name: Prepare artifacts
        run: |
          mkdir -p out
          
          # Helper to copy and rename without timestamp
          copy_artifact() {
            local app_dir=$1
            local name_prefix=$2
            local ext=$3
            local version=$(node -p "require('./apps/${app_dir}/package.json').version")
            cp apps/${app_dir}/builds/${name_prefix}-${version}-*.${ext} out/${name_prefix}-${version}.${ext}
          }

          copy_artifact "iris" "iris-chrome" "zip"
          copy_artifact "iris" "iris-firefox" "xpi"
          copy_artifact "mini-iris" "mini-iris-chrome" "zip"
          copy_artifact "mini-iris" "mini-iris-firefox" "xpi"
          copy_artifact "iitc-iris" "iitc-iris-chrome" "zip"
          copy_artifact "iitc-iris" "iitc-iris-firefox" "xpi"

      - name: Publish tagged release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: IRIS ${{ github.ref_name }}
          generate_release_notes: true
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
